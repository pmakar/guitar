<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title> Tempo Society</title>
  <style>
    :root {
      --bottom-height: 128px;
      --bg: #050505;
      --panel: #1A1F24;
      --panel-2: #232A30;
      --text: #D8E0E3;
      --muted: #8E9AA0;
      --line: #2A2F35;
      --accent: #8C1D18;
    }

    * { box-sizing: border-box; }

    body {
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      margin: 0;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", "DIN Condensed", "Roboto Condensed", system-ui, sans-serif;
      letter-spacing: 0.35px;
      background:
        radial-gradient(circle at 15% 10%, rgba(140, 29, 24, 0.22), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(62, 92, 99, 0.16), transparent 26%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0px, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 6px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 18px),
        linear-gradient(135deg, #050505 0%, #0B0F12 45%, #050505 100%);
      color: var(--text);
    }

    .metronome-bottom {
      display: grid;
      grid-template-columns: 46px 76px 46px 1fr 86px;
      gap: 8px;
      align-items: center;
      width: 100%;
      max-width: 900px;
    }

        input[type="number"] {
      width: 76px;
      padding: 8px;
      font-size: 18px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    input[type="range"] { width: 100%; }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.055), rgba(0,0,0,0.18)),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 6px),
        var(--panel-2);
      color: var(--text);
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    button.primary {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
      font-weight: 700;
    }

    main {
      padding: 80px 16px calc(var(--bottom-height) + 18px);
      max-width: 900px;
      margin: 0 auto;
    }

    h1, h2, h3 { margin-top: 0; }

    .card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.045), rgba(0,0,0,0.24)),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 7px),
        var(--panel);
      border: 1px solid var(--line);
      border-left: 4px solid rgba(140,29,24,0.75);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 12px 28px rgba(0,0,0,0.35);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .lesson-button {
      width: 100%;
      text-align: left;
      margin-bottom: 10px;
      padding: 16px;
    }

    .lesson-id {
      color: var(--accent);
      font-weight: 700;
      margin-right: 8px;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .tab-box {
      overflow-x: auto;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.022) 0px, rgba(255,255,255,0.022) 1px, transparent 1px, transparent 5px),
        repeating-linear-gradient(90deg, rgba(140,29,24,0.035) 0px, rgba(140,29,24,0.035) 1px, transparent 1px, transparent 14px),
        #101418;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: inset 0 0 24px rgba(0,0,0,0.45);
    }

    pre {
      margin: 0;
      font-family: "Courier New", monospace;
      font-size: 15px;
      line-height: 1.55;
      white-space: pre;
      letter-spacing: 0;
    }

    .progress-grid {
      display: grid;
      gap: 10px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #101418;
      color: var(--text);
      padding: 12px;
      font-size: 16px;
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #07090B;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      padding: 12px 16px;
      z-index: 10;
    }

    .top-nav button {
      min-width: 90px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      min-height: var(--bottom-height);
      background: #07090B;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      justify-items: center;
      align-items: center;
      padding: 10px 16px;
      z-index: 10;
    }

    

    @media (min-width: 720px) {
      main { padding-left: 24px; padding-right: 24px; }
      .progress-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <button id="backBtn">←</button>
    <button id="homeBtn">Home</button>
    <button id="nextBtn">Next →</button>
  </header>

  <main id="app"></main>

  <footer class="bottom-nav">

    <div class="metronome-bottom">
      <button id="bpmDown">−</button>
      <input id="bpmInput" type="number" min="0" max="240" step="5" value="80" />
      <button id="bpmUp">+</button>
      <input id="bpmSlider" type="range" min="0" max="240" step="5" value="80" />
      <button id="metroToggle">Start</button>
    </div>
  </footer>

  <script>
    const lessons = [
      {
        id: "S1",
        title: "Scales",
        category: "Foundation",
        targetBpm: 80,
        pages: [
          {
            heading: "Scale Systems",
            body: "Major, Harmonic Minor, Melodic Minor, Whole Tone, Diminished and modal systems.",
            tab: `Major
Harmonic Minor
Melodic Minor
Whole Tone
Diminished

Modes:
Ionian
Dorian
Phrygian
Lydian
Mixolydian
Aeolian
Locrian`
          },
          {
            heading: "Advanced Modes",
            body: "Extended modal colors and altered systems.",
            tab: `Aug Ionian
Dorian #11
Phrygian nat 6
Phrygian Dom
Lydian #5
Lydian #9
Mixolydian #11
Mixolydian b13
Ultralocrian
Locrian nat 9
Locrian nat 6
Altered Scale`
          }
        ]
      },
      {
        id: "A1",
        title: "Arpeggios",
        category: "Arpeggio System",
        targetBpm: 75,
        pages: [
          {
            heading: "Arpeggios + Full Range",
            body: "Single octave, two octave and full range arpeggio studies.",
            tab: `Arpeggios
Full Range Arp
Arp Intervals
Arp Sequences
2 Oct Arpeggios
Arp Tensions`
          }
        ]
      },
      {
        id: "D2",
        title: "Drop 2",
        category: "Harmony",
        targetBpm: 65,
        pages: [
          {
            heading: "Drop 2 System",
            body: "Drop 2 on string sets with tensions and harmonisation.",
            tab: `Drop 2
Drop 2 on String
Drop 2 Tensions
Scale Harmonisation
3 String Voicing`
          }
        ]
      },
      {
        id: "D3",
        title: "Drop 3",
        category: "Harmony",
        targetBpm: 65,
        pages: [
          {
            heading: "Drop 3 System",
            body: "Drop 3 voicings with tensions and string-set application.",
            tab: `Drop 3
Drop 3 on String
Drop 3 Tensions`
          }
        ]
      },
      {
        id: "T1",
        title: "Technique",
        category: "Picking + Mechanics",
        targetBpm: 90,
        pages: [
          {
            heading: "Technique Blocks",
            body: "Mechanical picking and articulation systems.",
            tab: `Alternate
Economy
Economy
Hybrid
Hybrid
Hybrid Divided
Hybrid Divided
Slap
Tapping
B. Frisell Tech
Notes in Grip`
          }
        ]
      },
      {
        id: "C1",
        title: "Chordal + Linear Blocks",
        category: "Application",
        targetBpm: 60,
        pages: [
          {
            heading: "Blocks + Progressions",
            body: "Chordal blocks, linear blocks and progression studies.",
            tab: `Chordal Blocks
Linear Blocks
Progressions

I-III-IV-V
I-III-II-V
I-VI-II-V
III-VI-II-V
I-IV-VII-III-VI-II-V
II-V-I-VI
Imaj-I7-IVm-bVII
I-VIIhalfdim-III7-VIm`
          }
        ]
      },
      {
        id: "H1",
        title: "Harmony Map",
        category: "Intervals + Voicings",
        targetBpm: 60,
        pages: [
          {
            heading: "Study Order",
            body: "Structured harmonic path from intervals to seventh chords and sequences.",
            tab: `1 Intervals
2 Triads (3rds and 4ths) + inversions
3 Close Voicing
4 Drop2 + tensions
5 Drop3 + tensions
6 Suspended chords
7 Quartal chords
8 Scale
9 Intervals
10 Triads
11 Seventh chords
12 Sequences 3,4,5
13 Arpeggios
13 Two Octave Arpeggios
14 Arp Tensions`
          }
        ]
      },
      {
        id: "CH1",
        title: "Chord Quality Reference",
        category: "Chord Formula",
        targetBpm: 50,
        pages: [
          {
            heading: "Chord Tensions",
            body: "Reference map for tensions and chord qualities.",
            tab: `Maj7 / Min7 / MinMaj7 / HalfDim / Dim / MajAug / Dom7 / Dom7sus / Dom7aug

Extensions:
b9  9  #9
b3  3
b11 11 #11
b5  5  #5
b13 13
bb7 b7 7
sus  Maj7`
          }
        ]
      }
    ];

    let currentLessonIndex = null;
    let currentPageIndex = 0;
    const app = document.getElementById("app");
    const nextBtn = document.getElementById("nextBtn");
    const backBtn = document.getElementById("backBtn");
    const homeBtn = document.getElementById("homeBtn");
    const bpmInput = document.getElementById("bpmInput");
    const bpmSlider = document.getElementById("bpmSlider");
    const metroToggle = document.getElementById("metroToggle");
    const bpmDown = document.getElementById("bpmDown");
    const bpmUp = document.getElementById("bpmUp");
    let audioContext = null;
    let wakeLock = null;
    let timerId = null;
    let isPlaying = false;

    async function requestWakeLock() {
      try {
        if ("wakeLock" in navigator) {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLock.addEventListener("release", () => {
            console.log("Wake lock released");
          });
        }
      } catch (err) {
        console.log("Wake lock not supported:", err);
      }
    }

    document.addEventListener("visibilitychange", async () => {
      if (wakeLock !== null && document.visibilityState === "visible") {
        await requestWakeLock();
      }
    });

    function getProgress() {
      return JSON.parse(localStorage.getItem("guitarPracticeProgress") || "{}");
    }
    function saveProgress(progress) {
      localStorage.setItem("guitarPracticeProgress", JSON.stringify(progress));
    }
    function getGlobalBpm() {
      return Number(localStorage.getItem("globalMetronomeBpm") || 80);
    }

    function setGlobalBpm(value) {
      localStorage.setItem("globalMetronomeBpm", String(value));
    }

    function syncBpm(value) {
      let bpm = Math.max(0, Math.min(240, Number(value) || 0));
      bpm = Math.round(bpm / 5) * 5;
      bpmInput.value = bpm;
      bpmSlider.value = bpm;
      setGlobalBpm(bpm);
      if (currentLessonIndex !== null) {
        const lesson = lessons[currentLessonIndex];
        const progress = getProgress();
        progress[lesson.id] = progress[lesson.id] || {};
        progress[lesson.id].lastBpm = bpm;
        saveProgress(progress);
      }
      if (isPlaying) {
        stopMetronome();
        if (bpm > 0) {
          startMetronome();
        }
      }
    }
    bpmInput.addEventListener("focus", () => {
      if (isPlaying) stopMetronome();
    });

    bpmInput.addEventListener("input", e => syncBpm(e.target.value));

    bpmInput.addEventListener("blur", async () => {
      if (Number(bpmInput.value) > 0) {
        await startMetronome();
      }
    });
    bpmSlider.addEventListener("pointerdown", () => {
      if (isPlaying) stopMetronome();
    });

    bpmSlider.addEventListener("touchstart", () => {
      if (isPlaying) stopMetronome();
    });

    bpmSlider.addEventListener("input", e => syncBpm(e.target.value));

    bpmSlider.addEventListener("change", async () => {
      if (Number(bpmSlider.value) > 0) {
        await startMetronome();
      }
    });

    bpmDown.addEventListener("click", () => {
      syncBpm(Number(bpmInput.value) - 5);
    });

    bpmUp.addEventListener("click", () => {
      syncBpm(Number(bpmInput.value) + 5);
    });

    function clickSound(accent = false) {
      if (!audioContext) return;

      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = "square";
      osc.frequency.value = accent ? 1400 : 1000;

      gain.gain.setValueAtTime(0.001, audioContext.currentTime);
      gain.gain.linearRampToValueAtTime(0.35, audioContext.currentTime + 0.003);
      gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.05);

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.start();
      osc.stop(audioContext.currentTime + 0.06);
    }
    async function startMetronome() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      audioContext = audioContext || new AudioCtx();

      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }
      isPlaying = true;
      metroToggle.textContent = "Stop";
      let beat = 0;
      clickSound(true);
      const bpmValue = Number(bpmInput.value);
      if (bpmValue <= 0) {
        stopMetronome();
        return;
      }
      const interval = 60000 / bpmValue;
      timerId = setInterval(() => {
        beat = (beat + 1) % 4;
        clickSound(beat === 0);
      }, interval);
    }
    function stopMetronome() {
      isPlaying = false;
      metroToggle.textContent = "Start";
      clearInterval(timerId);
      timerId = null;
    }
    metroToggle.addEventListener("click", async () => {
      if (isPlaying) {
        stopMetronome();
      } else {
        await requestWakeLock();
        await startMetronome();
      }
    });

    function renderHome() {
      currentLessonIndex = null;
      currentPageIndex = 0;
      const progress = getProgress();
      app.innerHTML = `
        <section class="card">
          <h1>guitar demystified </h1>
          <p class="meta">Precision, tension, and beautiful mistakes. Train slow. Play brutal.</p>
        </section>
        <section>
          ${lessons.map((lesson, index) => {
            const p = progress[lesson.id] || {};
            const status = p.completed ? "Completed" : "Not completed";
            const best = p.bestBpm ? `Best BPM: ${p.bestBpm}` : `Target BPM: ${lesson.targetBpm}`;
            return `<button class="lesson-button" onclick="openLesson(${index}, 0)">
              <span class="lesson-id">${lesson.id}</span><strong>${lesson.title}</strong>
              <div class="meta">${lesson.category} · ${status} · ${best}</div>
            </button>`;
          }).join("")}
        </section>`;
    }
    function openLesson(lessonIndex, pageIndex = 0) {
      currentLessonIndex = lessonIndex;
      currentPageIndex = pageIndex;
      const lesson = lessons[lessonIndex];
      const progress = getProgress();
      const saved = progress[lesson.id] || {};
      syncBpm(getGlobalBpm() || saved.lastBpm || lesson.targetBpm);
      renderLesson();
    }
    function renderLesson() {
      const lesson = lessons[currentLessonIndex];
      const page = lesson.pages[currentPageIndex];
      const progress = getProgress();
      const saved = progress[lesson.id] || {};
      app.innerHTML = `
        <section class="card">
          <div class="meta">${lesson.id} · ${lesson.category} · Page ${currentPageIndex + 1} of ${lesson.pages.length}</div>
          <h1>${lesson.title}</h1>
          <h2>${page.heading}</h2>
          <p>${page.body}</p>
        </section>
        <section class="card">
          <h3>Tab / Fingering</h3>
          <div class="tab-box"><pre>${page.tab}</pre></div>
        </section>
        <section class="card">
          <h3>Practice Progress</h3>
          <div class="progress-grid">
            <button class="primary" onclick="markComplete()">Mark Complete</button>
            <button onclick="saveBestBpm()">Save Current BPM as Best</button>
          </div>
          <p class="meta">Best BPM: ${saved.bestBpm || "—"} · Completed: ${saved.completed ? "Yes" : "No"}</p>
          <textarea id="lessonNotes" placeholder="Practice notes...">${saved.notes || ""}</textarea>
          <button onclick="saveNotes()">Save Notes</button>
        </section>`;
    }
    function markComplete() {
      const lesson = lessons[currentLessonIndex];
      const progress = getProgress();
      progress[lesson.id] = progress[lesson.id] || {};
      progress[lesson.id].completed = true;
      progress[lesson.id].lastPracticed = new Date().toISOString().slice(0, 10);
      saveProgress(progress);
      renderLesson();
    }
    function saveBestBpm() {
      const lesson = lessons[currentLessonIndex];
      const progress = getProgress();
      progress[lesson.id] = progress[lesson.id] || {};
      progress[lesson.id].bestBpm = Number(bpmInput.value);
      progress[lesson.id].lastPracticed = new Date().toISOString().slice(0, 10);
      saveProgress(progress);
      renderLesson();
    }
    function saveNotes() {
      const lesson = lessons[currentLessonIndex];
      const progress = getProgress();
      progress[lesson.id] = progress[lesson.id] || {};
      progress[lesson.id].notes = document.getElementById("lessonNotes").value;
      saveProgress(progress);
      renderLesson();
    }
    function nextPage() {
      if (currentLessonIndex === null) return;
      const lesson = lessons[currentLessonIndex];
      if (currentPageIndex < lesson.pages.length - 1) {
        currentPageIndex++;
        renderLesson();
        window.scrollTo(0, 0);
        return;
      }
      if (currentLessonIndex < lessons.length - 1) {
        openLesson(currentLessonIndex + 1, 0);
        window.scrollTo(0, 0);
        return;
      }
      syncBpm(getGlobalBpm());
    renderHome();
    }
    function previousPage() {
      if (currentLessonIndex === null) return;
      if (currentPageIndex > 0) {
        currentPageIndex--;
        renderLesson();
        window.scrollTo(0, 0);
        return;
      }
      if (currentLessonIndex > 0) {
        const previousLesson = lessons[currentLessonIndex - 1];
        openLesson(currentLessonIndex - 1, previousLesson.pages.length - 1);
        window.scrollTo(0, 0);
        return;
      }
      renderHome();
    }
    nextBtn.addEventListener("click", nextPage);
    backBtn.addEventListener("click", previousPage);
    homeBtn.addEventListener("click", renderHome);
    renderHome();
  </script>
</body>
</html>
