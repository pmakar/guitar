<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>shredmaster</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#090a0c" />
  <style>
    :root{
      --bottom-height:118px;
      --bg:#090a0c;
      --surface:#111417;
      --surface-2:#181d21;
      --surface-3:#22282d;
      --text:#f3f5f4;
      --muted:#a5b0b5;
      --line:#303840;
      --accent:#d43f36;
      --accent-2:#d8b46d;
      --ink:#070809;
      --good:#63b37b;
      --shadow:0 18px 46px rgba(0,0,0,.36);
    }

    *{box-sizing:border-box}
    html{background:var(--bg)}
    body{
      min-height:100vh;
      margin:0;
      touch-action:manipulation;
      -webkit-text-size-adjust:100%;
      font-family:"Inter Tight","Roboto Condensed","Arial Narrow",system-ui,sans-serif;
      letter-spacing:0;
      color:var(--text);
      background:
        linear-gradient(180deg,rgba(255,255,255,.04),transparent 160px),
        linear-gradient(90deg,rgba(212,63,54,.13),transparent 30%,transparent 74%,rgba(216,180,109,.09)),
        repeating-linear-gradient(90deg,rgba(255,255,255,.018) 0,rgba(255,255,255,.018) 1px,transparent 1px,transparent 42px),
        linear-gradient(135deg,#0d1013 0%,#090a0c 52%,#0d0e10 100%);
    }

    button,input,textarea{font:inherit}
    button{
      appearance:none;
      border:1px solid var(--line);
      border-radius:6px;
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(0,0,0,.16)),var(--surface-2);
      color:var(--text);
      min-height:42px;
      padding:10px 14px;
      font-weight:750;
      font-size:14px;
      cursor:pointer;
      text-transform:uppercase;
      letter-spacing:.04em;
      transition:transform .12s ease,border-color .12s ease,background .12s ease;
    }
    button:active{transform:translateY(1px)}
    button.primary{background:linear-gradient(180deg,#e14b42,#a92f29);border-color:#ed6159;color:#fff}
    button.ghost{background:#0b0f12}
    button.icon{width:44px;padding:0;display:grid;place-items:center;font-size:20px}

    input[type=number]{
      width:78px;
      height:42px;
      padding:8px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#080b0d;
      color:var(--text);
      font-size:18px;
      font-weight:800;
      text-align:center;
    }
    input[type=range]{width:100%;accent-color:var(--accent)}
    textarea{
      width:100%;
      min-height:96px;
      resize:vertical;
      border-radius:8px;
      border:1px solid var(--line);
      background:#090d10;
      color:var(--text);
      padding:12px;
      font-size:16px;
      line-height:1.45;
    }

    .top-nav{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:20;
      display:grid;
      grid-template-columns:44px minmax(158px,220px) 44px;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px max(14px,env(safe-area-inset-left)) 10px;
      background:rgba(7,9,11,.86);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(16px);
    }
    .brand{
      min-width:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight:900;
      text-transform:none;
      letter-spacing:.08em;
      color:#fff;
      border-color:#3a444c;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02)),#0c1013;
      width:100%;
      min-height:46px;
      overflow:hidden;
      padding:0;
    }
    .brand-word{
      display:inline;
      min-width:0;
      font-size:16px;
      font-variant-caps:small-caps;
      text-transform:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .logo-svg{
      display:block;
      width:34px;
      height:34px;
      flex:0 0 auto;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.34));
    }
    .logo-svg .logo-shell{fill:#f3f5f4}
    .logo-svg .logo-core{fill:#111417}
    .logo-svg .logo-slash{stroke:var(--accent)}
    .logo-svg .logo-string{stroke:var(--accent-2)}
    .logo-svg .logo-wire{stroke:#f3f5f4}

    .bottom-nav{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      z-index:20;
      min-height:var(--bottom-height);
      padding:12px max(14px,env(safe-area-inset-left)) max(12px,env(safe-area-inset-bottom));
      background:rgba(7,9,11,.9);
      border-top:1px solid var(--line);
      backdrop-filter:blur(16px);
    }
    .metronome-bottom{
      display:grid;
      grid-template-columns:44px 78px 44px minmax(120px,1fr) 92px;
      gap:10px;
      align-items:center;
      width:100%;
      max-width:980px;
      margin:0 auto;
    }

    main{
      width:min(100%,1180px);
      margin:0 auto;
      padding:88px 16px calc(var(--bottom-height) + 24px);
    }
    h1,h2,h3,p{margin-top:0}
    h1{
      margin-bottom:8px;
      font-size:64px;
      line-height:.92;
      text-transform:uppercase;
      letter-spacing:.015em;
      overflow-wrap:anywhere;
    }
    h2{font-size:36px;line-height:1;margin-bottom:10px}
    h3{font-size:17px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent-2)}
    p{line-height:1.55}

    .card{
      min-width:0;
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.16)),var(--surface);
      border:1px solid var(--line);
      border-radius:6px;
      padding:18px;
      margin-bottom:14px;
      box-shadow:0 10px 26px rgba(0,0,0,.2);
    }
    .meta{color:var(--muted);font-size:14px;line-height:1.45}
    .subtle{color:var(--muted)}
    .lesson-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}
    .lesson-button{
      display:grid;
      grid-template-rows:1fr auto;
      width:100%;
      min-height:126px;
      padding:17px;
      text-align:left;
      text-transform:none;
      letter-spacing:0;
      background:
        linear-gradient(90deg,rgba(212,63,54,.16),transparent 8px),
        linear-gradient(160deg,rgba(255,255,255,.065),rgba(0,0,0,.14)),
        var(--surface-2);
    }
    .lesson-button:hover{border-color:#66747d;background-color:#1c2429}
    .lesson-title{font-size:22px;line-height:1.03;font-weight:950;text-transform:uppercase}

    .toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .pill{
      display:inline-flex;
      align-items:center;
      min-height:32px;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#0c1114;
      color:var(--muted);
      font-size:14px;
      line-height:1.2;
    }

    .content-grid{display:grid;grid-template-columns:1fr;gap:14px}
    .content-grid>*{min-width:0}
    .visual-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
    .visual-card{
      min-height:96px;
      border:1px solid var(--line);
      border-radius:6px;
      padding:15px;
      background:
        linear-gradient(180deg,rgba(255,255,255,.045),rgba(0,0,0,.16)),
        #0d1215;
    }
    .visual-card strong{
      display:block;
      margin-bottom:10px;
      color:#fff;
      font-size:clamp(24px,2.7vw,34px);
      line-height:.95;
      text-transform:none;
      letter-spacing:.01em;
    }
    .string-set-break{
      grid-column:1/-1;
      margin-top:12px;
      padding:10px 12px;
      border-top:2px solid var(--accent);
      border-bottom:1px solid var(--line);
      color:var(--accent-2);
      background:#090d10;
      font-size:15px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
    }
    .string-set-break:first-child{margin-top:0}
    .diagram-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
    .diagram-block{min-width:150px;flex:1 1 150px}
    .diagram-label{margin-bottom:6px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
    .mini-fretboard{
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:8px;
      background:
        repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0,rgba(255,255,255,.018) 1px,transparent 1px,transparent 8px),
        #090d10;
    }
    .mini-fretboard svg{display:block;width:100%;height:auto}
    .formula-line{font-family:"SFMono-Regular","Courier New",monospace;letter-spacing:0;color:var(--text);font-size:14px;line-height:1.5;white-space:pre-wrap}
    .scalar-stack{display:grid;gap:14px}
    .compact-list{display:grid;gap:8px}
    .compact-row{
      display:grid;
      grid-template-columns:minmax(86px,.34fr) minmax(0,1fr);
      gap:10px;
      align-items:start;
      border:1px solid var(--line);
      border-radius:8px;
      padding:11px 12px;
      background:#0d1215;
    }
    .compact-row strong{color:#fff;text-transform:uppercase}
    .compact-row .meta{font-size:13px}
    .scale-board-list{display:grid;gap:12px}
    .scale-board{
      min-width:0;
      border:1px solid var(--line);
      border-radius:6px;
      padding:14px;
      background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(0,0,0,.12)),#0d1215;
    }
    .scale-board-title{
      display:flex;
      justify-content:flex-start;
      gap:14px;
      margin-bottom:12px;
      color:#fff;
      font-size:24px;
      font-weight:900;
      text-transform:uppercase;
    }
    .scale-board-title strong{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .scale-name{letter-spacing:.02em}
    .scale-chord{
      display:inline-flex;
      align-items:center;
      min-height:40px;
      padding:6px 12px;
      border:1px solid rgba(216,180,109,.55);
      border-radius:6px;
      background:linear-gradient(180deg,rgba(216,180,109,.12),rgba(0,0,0,.16)),#090d10;
      color:#f1ce8a;
      font-size:clamp(26px,3.2vw,40px);
      font-weight:950;
      line-height:.9;
      text-transform:none;
    }
    .tab-box,.fretboard-wrap{
      overflow-x:auto;
      border:1px solid var(--line);
      border-radius:8px;
      padding:14px;
      background:
        repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 7px),
        #0a0f12;
      box-shadow:inset 0 0 24px rgba(0,0,0,.42);
    }
    pre{margin:0;font-family:"SFMono-Regular","Courier New",monospace;font-size:15px;line-height:1.55;white-space:pre;letter-spacing:0}

    .fretboard-controls{
      display:grid;
      grid-template-columns:44px 1fr 44px;
      gap:10px;
      align-items:center;
      margin:10px 0 12px;
    }
    .shape-title{text-align:center;font-weight:900;text-transform:uppercase;color:#fff}
    .degree-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .degree{
      width:36px;
      height:36px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:#edf2f3;
      color:#090d10;
      border:2px solid #090d10;
      font-family:"SFMono-Regular","Courier New",monospace;
      font-size:12px;
      font-weight:900;
    }
    .degree.root{background:var(--accent);color:#fff;border-color:#f1d6d4}
    .tech-stack{display:grid;gap:14px}
    .tech-section{
      border:1px solid var(--line);
      border-radius:6px;
      background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(0,0,0,.14)),#0d1215;
      overflow:hidden;
    }
    .tech-section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      padding:16px;
      border-bottom:1px solid var(--line);
      background:#090d10;
    }
    .tech-section-head h3{margin:0}
    .tech-section-head .meta{text-align:right}
    .tech-grid{display:grid;grid-template-columns:1fr;gap:12px;padding:14px}
    .exercise-card{
      display:grid;
      gap:12px;
      align-content:start;
      min-height:244px;
      border:1px solid rgba(255,255,255,.1);
      border-radius:6px;
      padding:14px;
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(0,0,0,.16)),#11171b;
    }
    .exercise-card strong{
      display:block;
      color:#fff;
      font-size:clamp(22px,2.5vw,31px);
      line-height:.98;
      text-transform:uppercase;
    }
    .exercise-meta{display:flex;gap:8px;flex-wrap:wrap}
    .tech-tag{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      border:1px solid rgba(216,180,109,.42);
      border-radius:999px;
      padding:4px 9px;
      color:#f1ce8a;
      background:rgba(216,180,109,.08);
      font-size:12px;
      font-weight:850;
      text-transform:uppercase;
      letter-spacing:.06em;
    }
    .movement-code{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      font-family:"SFMono-Regular","Courier New",monospace;
      letter-spacing:0;
    }
    .move-cell{
      min-width:34px;
      min-height:30px;
      display:grid;
      place-items:center;
      border:1px solid var(--line);
      border-radius:6px;
      padding:4px 7px;
      color:#fff;
      background:#090d10;
      font-size:13px;
      font-weight:800;
    }
    .move-cell.accent{border-color:rgba(212,63,54,.72);background:rgba(212,63,54,.18)}
    .notation-board{
      overflow-x:auto;
      border:1px solid rgba(255,255,255,.14);
      border-radius:8px;
      background:#050607;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 10px 22px rgba(0,0,0,.3);
    }
    .notation-board svg{display:block;width:auto;max-width:none;min-width:760px;height:auto}
    .notation-key{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding:10px 2px 2px;
    }
    .time-step{
      min-width:68px;
      border:1px solid var(--line);
      border-radius:6px;
      padding:7px 8px;
      background:#090d10;
      color:#fff;
      font-family:"SFMono-Regular","Courier New",monospace;
      letter-spacing:0;
    }
    .time-step.rest{border-color:rgba(216,180,109,.45);background:rgba(216,180,109,.08)}
    .time-step strong{display:block;color:#f1ce8a;font-size:11px;line-height:1}
    .time-step span{display:block;margin-top:5px;font-size:13px;font-weight:850}
    .time-step small{display:block;margin-top:4px;color:var(--muted);font-size:10px}
    .exercise-info{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
      gap:8px;
      margin-top:2px;
    }
    .exercise-info-item{
      border:1px solid rgba(255,255,255,.1);
      border-radius:6px;
      padding:10px;
      background:#090d10;
    }
    .exercise-info-item strong{
      display:block;
      margin:0 0 6px;
      color:#f1ce8a;
      font-size:12px;
      line-height:1;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .exercise-info-item span{display:block;color:var(--muted);font-size:13px;line-height:1.35}
    .exercise-note{margin:0;color:var(--muted);font-size:14px;line-height:1.45}
    .progress-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:12px}
    .notes-actions{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:10px}

    @media(min-width:760px){
      main{padding-left:24px;padding-right:24px}
      .content-grid{grid-template-columns:minmax(0,1.45fr) minmax(280px,.8fr)}
      .progress-grid{grid-template-columns:1fr 1fr}
    }
    @media(max-width:900px){
      h1{font-size:52px}
      h2{font-size:30px}
    }
    @media(max-width:560px){
      :root{--bottom-height:160px}
      .metronome-bottom{grid-template-columns:44px 78px 44px 1fr}
      #metroToggle{grid-column:1/-1;width:100%}
      h1{font-size:38px}
      h2{font-size:24px}
      .brand{gap:8px}
      .logo-svg{width:30px;height:30px}
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <button class="icon" id="backBtn" aria-label="Previous">&lt;</button>
    <button class="brand ghost" id="homeBtn" aria-label="Home">
      <svg class="logo-svg" viewBox="0 0 64 64" aria-hidden="true">
        <path class="logo-shell" d="M32 6c14 11 22 24 21 37-.8 12-10 18-21 14-11 4-20-2-21-14C10 30 18 17 32 6Z"/>
        <path class="logo-core" d="M32 11c11 10 17 20 16 31-.6 8-7 12-16 9-9 3-15-1-16-9-1-11 5-21 16-31Z"/>
        <path class="logo-slash" d="M18 45 46 17" fill="none" stroke-width="7" stroke-linecap="round"/>
        <path class="logo-string" d="M21 48 49 20" fill="none" stroke-width="2.5" stroke-linecap="round"/>
        <path class="logo-wire" d="M17 35 36 16M27 50 50 27" fill="none" stroke-width="2" stroke-linecap="round" opacity=".9"/>
      </svg>
      <span class="brand-word">shredmaster</span>
    </button>
    <button class="icon" id="nextBtn" aria-label="Next">&gt;</button>
  </header>
  <main id="app"></main>
  <footer class="bottom-nav">
    <div class="metronome-bottom">
      <button class="icon" id="bpmDown" aria-label="Decrease BPM">−</button>
      <input id="bpmInput" aria-label="BPM" type="number" min="0" max="240" step="5" value="80"/>
      <button class="icon" id="bpmUp" aria-label="Increase BPM">+</button>
      <input id="bpmSlider" aria-label="BPM slider" type="range" min="0" max="240" step="5" value="80"/>
      <button class="primary" id="metroToggle">Start</button>
    </div>
  </footer>

<script>
const dropQualities={
  Maj7:["1","3","5","7"],
  Min7:["1","b3","5","b7"],
  MinMaj7:["1","b3","5","7"],
  HalfDim:["1","b3","b5","b7"],
  Dim:["1","b3","b5","bb7"],
  MajAug:["1","3","#5","7"],
  Dom7:["1","3","5","b7"],
  Dom7sus:["1","4","5","b7"],
  Dom7aug:["1","3","#5","b7"]
};
const dropInversions=[
  ["Root Position",[0,2,3,1]],
  ["1st Inversion",[1,3,0,2]],
  ["2nd Inversion",[2,0,1,3]],
  ["3rd Inversion",[3,1,2,0]]
];
const drop3Inversions=[
  ["Root Position",[0,3,1,2]],
  ["1st Inversion",[1,0,2,3]],
  ["2nd Inversion",[2,1,3,0]],
  ["3rd Inversion",[3,2,0,1]]
];
const drop2StringSets=[
  ["E String","E A D G",3],
  ["A String","A D G B",10],
  ["D String","D G B e",5]
];
const drop3StringSets=[
  ["E String","E D G B",3],
  ["A String","A G B e",10]
];
function makeDropPages(type,inversion,cards){
  return [
    {heading:`${inversion} - Shape First`,body:"Learn the grip shape first. Static control before movement.",cards:cards.map(c=>[c[0],c[1],"main shape"])},
    {heading:`${inversion} - Diatonically`,body:"Run the same shape through the key: I ii iii IV V vi vii°.",cards:[["Key of G","Gmaj7 -> Am7 -> Bm7 -> Cmaj7 -> D7 -> Em7 -> F#m7b5","full harmonisation"]]},
    {heading:`${inversion} - II-V-I`,body:"Apply the same shape to real harmonic movement.",cards:[["Major II-V-I","Am7 -> D7 -> Gmaj7","essential"],["Minor II-V-I","Bm7b5 -> E7 -> AmMaj7","advanced"]]}
  ];
}
function makeDrop2Cards(){
  return makeDropCards(dropInversions,drop2StringSets,"E, A and D string voicings");
}
function makeDrop3Cards(){
  return makeDropCards(drop3Inversions,drop3StringSets,"E and A string voicings");
}
function makeDropCards(inversions,stringSets,label){
  return inversions.flatMap(([group,order])=>Object.entries(dropQualities).map(([name,degrees])=>{
    const voicedDegrees=order.map(index=>degrees[index]);
    return [
      name,
      voicedDegrees.join(" "),
      label,
      {
        group,
        voicings:stringSets.map(([voicingLabel,strings,start])=>({
          label:voicingLabel,
          strings,
          start,
          degrees:voicedDegrees
        }))
      }
    ];
  }));
}
const triadStringSets=[
  ["Strings 6-5-4","E A D"],
  ["Strings 5-4-3","A D G"],
  ["Strings 4-3-2","D G B"],
  ["Strings 3-2-1","G B e"]
];
const triadInversions=[
  ["Root","1 3 5"],
  ["1st Inversion","3 5 1"],
  ["2nd Inversion","5 1 3"]
];
const triadQualities=[
  ["Major",["1","3","5"]],
  ["Minor",["1","b3","5"]],
  ["Diminished",["1","b3","b5"]],
  ["Augmented",["1","3","#5"]]
];
function invertDegrees(degrees,index){

function makeChordVoicingCards(category,qualities){

function syncBpm(value){
  let bpm=Math.max(0,Math.min(240,Number(value)||0));
  bpm=Math.round(bpm/5)*5;
  bpmInput.value=bpm;
  bpmSlider.value=bpm;
  setGlobalBpm(bpm);
  if(currentLessonIndex!==null){
    const lesson=lessons[currentLessonIndex],p=getProgress();
    p[lesson.id]=p[lesson.id]||{};
    p[lesson.id].lastBpm=bpm;

}
function clickSound(){
  if(!audioContext)return;
  const osc=audioContext.createOscillator(),gain=audioContext.createGain();
  osc.type="square";
  osc.frequency.value=940;
  gain.gain.setValueAtTime(.001,audioContext.currentTime);
  gain.gain.linearRampToValueAtTime(1,audioContext.currentTime+.003);
  gain.gain.exponentialRampToValueAtTime(.001,audioContext.currentTime+.05);
  osc.connect(gain);
  gain.connect(audioContext.destination);
  osc.start();
  osc.stop(audioContext.currentTime+.06);
}
async function startMetronome(){
  const AudioCtx=window.AudioContext||window.webkitAudioContext;
  audioContext=audioContext||new AudioCtx();
  if(audioContext.state==="suspended")await audioContext.resume();
  const bpmValue=Number(bpmInput.value);
  if(bpmValue<=0){stopMetronome();return}
  isPlaying=true;
  metroToggle.textContent="Stop";
  clickSound();
  clearInterval(timerId);

}

function renderDegreeStrip(degrees=[]){return `<div class="degree-strip">${degrees.map(d=>`<span class="degree">${html(d)}</span>`).join("")}</div>`}
function findFretForPc(stringNumber,pc,start=3){
  for(let f=start;f<start+8;f++){
    if((stringPitch[stringNumber]+f)%12===pc)return f;
  }
  for(let f=0;f<17;f++){
    if((stringPitch[stringNumber]+f)%12===pc)return f;
  }
  return start;
}
function candidateFretsForPc(stringNumber,pc){
  const frets=[];
  for(let f=0;f<=17;f++){
    if((stringPitch[stringNumber]+f)%12===pc)frets.push(f);
  }
  return frets;
}
function compactFretsForPcs(strings,pcs,start=3){
  const candidates=pcs.map((pc,index)=>candidateFretsForPc(strings[index],pc));
  const combos=[];
  function walk(index,current){
    if(index===candidates.length){
      const min=Math.min(...current),max=Math.max(...current);
      const span=max-min;
      const center=current.reduce((sum,f)=>sum+f,0)/current.length;
      const openPenalty=current.filter(f=>f===0).length*1.5;
      const score=span*10+Math.abs(center-start)*1.4+openPenalty;
      combos.push({frets:current,score});
      return;
    }
    candidates[index].forEach(fret=>walk(index+1,current.concat(fret)));
  }
  walk(0,[]);
  combos.sort((a,b)=>a.score-b.score);
  return combos[0]?.frets||pcs.map((pc,index)=>findFretForPc(strings[index],pc,start));
}
function chordRootPc(name){
  const match=String(name).match(/[A-G](?:#|b)?/);
  return match?notePc[match[0]]:scaleRootG;
}
function chordFormula(name){
  const value=String(name);
  if(/m7b5|half/i.test(value))return ["1","b3","b5","b7"];
  if(/dim7/i.test(value))return ["1","b3","b5","bb7"];
  if(/dim/i.test(value))return ["1","b3","b5"];
  if(/mMaj7/i.test(value))return ["1","b3","5","7"];
  if(/maj7/i.test(value))return ["1","3","5","7"];
  if(/min7|m7/.test(value))return ["1","b3","5","b7"];
  if(/sus2/i.test(value))return ["1","2","5"];
  if(/sus4/i.test(value))return ["1","4","5"];
  if(/9sus/i.test(value))return ["1","4","5","b7","9"];
  if(/aug/i.test(value))return ["1","3","#5"];
  if(/7/.test(value))return ["1","3","5","b7"];
  if(/^m|Min|minor/i.test(value))return ["1","b3","5"];
  return ["1","3","5"];
}
function stringsForCount(count){
  if(count<=3)return [3,2,1].slice(0,count);
  if(count===4)return [4,3,2,1];
  return [5,4,3,2,1].slice(0,count);
}
function shapeFromPcs(name,pcs,start=3){
  const strings=stringsForCount(pcs.length);
  const notes=pcs.map((pc,index)=>{
    const s=strings[index]||1;
    return {s,f:findFretForPc(s,pc,start),n:pitchNames[pc]};
  });
  return {name,startFret:Math.max(0,Math.min(...notes.map(note=>note.f))),notes};
}
function shapeFromDegrees(name,degrees,rootPc=scaleRootG,start=3){
  return shapeFromPcs(name,degrees.map(degree=>(rootPc+(degreePc[degree]??0))%12),start);
}
function shapeFromDegreesOnStrings(name,degrees,stringsValue,rootPc=scaleRootG,start=3,fretShift=0){
  const stringNames={e:1,B:2,G:3,D:4,A:5,E:6};
  const strings=String(stringsValue).split(/\s+/).map(token=>stringNames[token]).filter(Boolean);
  const pcs=degrees.map(degree=>(rootPc+(degreePc[degree]??0))%12);
  const frets=compactFretsForPcs(strings,pcs,start);
  const notes=degrees.map((degree,index)=>{
    const s=strings[index]||strings[strings.length-1]||1;
    const pc=pcs[index];
    return {s,f:frets[index],n:pitchNames[pc]};
  });
  return {name,startFret:Math.max(0,Math.min(...notes.map(note=>note.f))),notes,fretShift};
}
function shapeFromArpeggioPosition(name,degrees,strings,start,rootPc=scaleRootG){
  const pcs=new Set(degrees.map(degree=>(rootPc+(degreePc[degree]??0))%12));
  const notes=[];
  strings.forEach(s=>{
    for(let f=start;f<=start+4;f++){
      const pc=(stringPitch[s]+f)%12;
      if(pcs.has(pc))notes.push({s,f,n:pitchNames[pc]});
    }
  });
  return {name,startFret:start,notes};
}
function parseDegreeTokens(value){
  return String(value).replace(/[·.]/g," ").split(/\s+/).map(token=>token.trim()).filter(token=>degreePc[token]!==undefined);
}
function parseNoteTokens(value){
  return String(value).split(/\s+/).map(token=>token.trim()).filter(token=>notePc[token]!==undefined);
}
function progressionNames(value){
  return String(value).split(/\s*(?:->|→)\s*/).map(item=>item.trim()).filter(Boolean);
}
function stringSetShape(name,value){
  const stringNames={e:1,B:2,G:3,D:4,A:5,E:6};
  const strings=String(value).split(/\s+/).map(token=>stringNames[token]).filter(Boolean);
  const frets=[5,4,3,5,4,3];
  return {name,startFret:3,notes:strings.map((s,index)=>({s,f:frets[index]||3,n:""}))};
}
function renderMiniFretboard(shape){
  const fretShift=shape.fretShift||0;
  const minFret=Math.max(0,Math.min(...shape.notes.map(note=>note.f)));
  const maxFret=Math.max(...shape.notes.map(note=>note.f))+fretShift;
  const start=shape.startFret??Math.max(0,minFret-1);
  const fretsShown=Math.max(5,maxFret-start+2);
  const height=128,left=34,top=18,stringGap=16,fretGap=28,width=left+fretsShown*fretGap+22;
  const stringLines=[1,2,3,4,5,6].map((s,i)=>`<line x1="${left}" y1="${top+i*stringGap}" x2="${left+fretsShown*fretGap}" y2="${top+i*stringGap}" stroke="#6f7b82" stroke-width="${1+i*.18}"/>`).join("");
  const fretLines=Array.from({length:fretsShown+1},(_,i)=>`<line x1="${left+i*fretGap}" y1="${top}" x2="${left+i*fretGap}" y2="${top+stringGap*5}" stroke="#4e5960" stroke-width="${i===0?2:1}"/>`).join("");
  const dots=shape.notes.map(note=>{
    const x=left+(note.f+fretShift-start)*fretGap+fretGap/2,y=top+(note.s-1)*stringGap;
    return `<circle cx="${x}" cy="${y}" r="7" fill="#edf2f3" stroke="#090d10" stroke-width="1.5"/>`;
  }).join("");
  const labels=["e","B","G","D","A","E"].map((label,i)=>`<text x="12" y="${top+i*stringGap+4}" fill="#98a6ac" font-size="10">${label}</text>`).join("");
  return `<div class="mini-fretboard"><svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" role="img" aria-label="${html(shape.name)} fretboard diagram">${labels}${stringLines}${fretLines}${dots}</svg></div>`;
}
function renderDiagramBlocks(card,type){
  const [title,value,,options]=card;
  if(options?.arpeggio){
    const arpeggio=options.arpeggio;
    return `<div class="diagram-block">${renderMiniFretboard(shapeFromArpeggioPosition(title,arpeggio.degrees,arpeggio.strings,arpeggio.start))}</div>`;
  }
  if(options?.voicings){
    return options.voicings.map(voicing=>`<div class="diagram-block"><div class="diagram-label">${html(voicing.label)}</div>${renderMiniFretboard(shapeFromDegreesOnStrings(`${title} ${voicing.label}`,voicing.degrees,voicing.strings,scaleRootG,voicing.start||3,voicing.fretShift||0))}</div>`).join("");
  }
  if(options?.strings&&options?.degrees){
    return `<div class="diagram-block">${renderMiniFretboard(shapeFromDegreesOnStrings(title,options.degrees,options.strings,scaleRootG,options.start||3,options.fretShift||0))}</div>`;
  }
  const progression=progressionNames(value);
  if(progression.length>1){
    return progression.map(name=>`<div class="diagram-block"><div class="diagram-label">${html(name)}</div>${renderMiniFretboard(shapeFromDegrees(name,chordFormula(name),chordRootPc(name)))}</div>`).join("");
  }
  if(type==="stringSets"||/^e B G|^B G D|^G D A|^D A E/.test(value)){
    return `<div class="diagram-block">${renderMiniFretboard(stringSetShape(title,value))}</div>`;
  }
  if(title==="Inversions"){
    return [["Root",["1","3","5"]],["1st",["3","5","1"]],["2nd",["5","1","3"]]].map(item=>`<div class="diagram-block"><div class="diagram-label">${item[0]}</div>${renderMiniFretboard(shapeFromDegrees(item[0],item[1]))}</div>`).join("");
  }
  const degreeTokens=parseDegreeTokens(value);
  if(degreeTokens.length){
    return `<div class="diagram-block">${renderMiniFretboard(shapeFromDegrees(title,degreeTokens))}</div>`;
  }
  const noteTokens=parseNoteTokens(value);
  if(noteTokens.length){
    return `<div class="diagram-block">${renderMiniFretboard(shapeFromPcs(title,noteTokens.map(note=>notePc[note])))}</div>`;
  }
  return `<div class="diagram-block">${renderMiniFretboard(shapeFromDegrees(title,chordFormula(title),chordRootPc(title)))}</div>`;
}

    <section class="card">
      <h3>Intervals</h3>
      <div class="compact-list">${page.intervals.map(interval=>`<div class="compact-row">
        <div><strong>${html(interval.heading)}</strong>${renderDegreeStrip(interval.degrees)}</div>
        <div class="formula-line">${html(interval.formula)}</div>
      </div>`).join("")}</div>
    </section>
  </div>`;
}
function renderMoveCells(moves=[],accent=[]){
  const accentSet=new Set(accent||[]);
  return `<div class="movement-code">${moves.map((move,index)=>`<span class="move-cell ${accentSet.has(index)?'accent':''}">${html(move)}</span>`).join("")}</div>`;
}
function stringNameFromNumber(value){
  return ({1:"e",2:"B",3:"G",4:"D",5:"A",6:"E"})[value]||String(value);
}
function chunk(items,size){
  return Array.from({length:Math.ceil(items.length/size)},(_,index)=>items.slice(index*size,index*size+size));
}
function buildTechniqueSteps(exercise){
  const notes=exercise.diagram?.notes||[];
  const moves=exercise.moves||[];
  if(!notes.length)return [];
  const count=Math.max(notes.length,moves.length||0);
  return Array.from({length:count},(_,index)=>{
    const move=moves[index]||moves[index%moves.length]||String(index+1);
    const isRest=/^rest$/i.test(move);
    return {index,move,isRest,note:isRest?null:notes[index%notes.length]};
  });
}
function techniqueFocusForSection(sectionTitle=""){
  const title=String(sectionTitle);
  if(title.includes("Left-Hand"))return "Finger lands just behind the fret; keep the thumb light and release pressure after each note.";
  if(title.includes("Right-Hand"))return "Pick motion stays small. Downstrokes and upstrokes should have the same volume.";
  if(title.includes("Legato"))return "Only pick the first note of each cell. Hammer-ons and pull-offs must match the picked note.";
  if(title.includes("Slap"))return "Muted hits count as real beats. Keep slap, pop, and ghost notes the same distance apart.";
  if(title.includes("Tapping"))return "Tap with authority, pull off with a small pluck, and mute unused strings before adding speed.";
  if(title.includes("Fingerpicking"))return "Thumb stays as the metronome while the fingers drop in without changing the pulse.";
  return "Keep every movement locked to the click and stop when tension starts to build.";
}
function notationSymbol(move=""){
  const value=String(move);
  if(/^rest$/i.test(value))return "rest";
  if(value===">")return ">";
  if(/^Tup$/i.test(value)||/^U$/i.test(value))return "^";
  if(/^Tdn$/i.test(value)||/^D$/i.test(value))return "v";
  if(/^x$/i.test(value))return "x";
  if(/^pick$/i.test(value))return "p";
  return value.length>5?value.slice(0,5):value;
}
function renderNotationBoard(exercise){
  const steps=buildTechniqueSteps(exercise);
  if(!steps.length)return "";
  const systems=chunk(steps,24);
  const cellW=34,lineGap=14,staffLeft=44,staffTop=30,staffHeight=lineGap*5,beamDrop=34;
  const paper="#050607",ink="#f3f5f4",muted="#9aa6aa";
  const maxSteps=Math.max(...systems.map(system=>system.length));
  const width=Math.max(760,staffLeft+maxSteps*cellW+18);
  const systemH=staffHeight+beamDrop+70;
  const height=systems.length*systemH+20;
  const stringLabels=["e","B","G","D","A","E"];
  const systemSvgs=systems.map((system,systemIndex)=>{
    const y0=staffTop+systemIndex*systemH;
    const x0=staffLeft;
    const xEnd=x0+system.length*cellW;
    const lines=stringLabels.map((label,index)=>{
      const y=y0+index*lineGap;
      return `<text x="${x0-24}" y="${y+4}" fill="${muted}" font-size="10" font-family="SFMono-Regular, Courier New">${label}</text><line x1="${x0}" y1="${y}" x2="${xEnd}" y2="${y}" stroke="${ink}" stroke-width="1.35"/>`;
    }).join("");
    const grid=Array.from({length:system.length+1},(_,index)=>{
      const x=x0+index*cellW;
      const strong=index===0||index===system.length||index%8===0;
      return `<line x1="${x}" y1="${y0-lineGap*.55}" x2="${x}" y2="${y0+staffHeight}" stroke="${ink}" stroke-width="${strong?2.2:1}"/>`;
    }).join("");
    const frets=system.map((step,index)=>{
      const x=x0+index*cellW+cellW/2;
      const stepNotes=Array.isArray(step.note)?step.note:(step.note?[step.note]:[]);
      if(!stepNotes.length){
        const y=y0-lineGap;
        return `<rect x="${x-10}" y="${y-11}" width="20" height="15" fill="${paper}"/><text x="${x}" y="${y+1}" text-anchor="middle" fill="${ink}" font-size="15" font-family="SFMono-Regular, Courier New">x</text>`;
      }
      const isMuted=/^x$/i.test(step.move);
      return stepNotes.map(note=>{
        const y=y0+(note.s-1)*lineGap;
        const value=isMuted?"x":note.f;
        return `<rect x="${x-10}" y="${y-11}" width="20" height="15" fill="${paper}"/><text x="${x}" y="${y+1}" text-anchor="middle" fill="${ink}" font-size="15" font-family="SFMono-Regular, Courier New">${html(value)}</text>`;
      }).join("");
    }).join("");
    const beams=Array.from({length:Math.ceil(system.length/4)},(_,groupIndex)=>{
      const count=Math.min(4,system.length-groupIndex*4);
      if(count<2)return "";
      const startX=x0+groupIndex*4*cellW;
      const endX=startX+(count-1)*cellW;
      const stemTop=y0+staffHeight+6;
      const stemBottom=y0+staffHeight+beamDrop;
      const stems=Array.from({length:count},(_,index)=>{
        const x=startX+index*cellW+cellW/2;
        return `<line x1="${x}" y1="${stemTop}" x2="${x}" y2="${stemBottom}" stroke="${ink}" stroke-width="1.35"/>`;
      }).join("");
      return `${stems}<line x1="${startX+cellW/2}" y1="${stemBottom}" x2="${endX+cellW/2}" y2="${stemBottom}" stroke="${ink}" stroke-width="4"/>`;
    }).join("");
    const motions=system.map((step,index)=>{
      const x=x0+index*cellW+cellW/2;
      const y=y0+staffHeight+beamDrop+28;
      const symbol=notationSymbol(step.move);
      const fontSize=symbol.length>4?9:symbol.length>2?11:15;
      return `<text x="${x}" y="${y}" text-anchor="middle" fill="${ink}" font-size="${fontSize}" font-family="SFMono-Regular, Courier New">${html(symbol)}</text>`;
    }).join("");
    const endBar=systemIndex===systems.length-1?`<line x1="${xEnd-4}" y1="${y0-lineGap*.55}" x2="${xEnd-4}" y2="${y0+staffHeight}" stroke="${ink}" stroke-width="1.5"/><line x1="${xEnd}" y1="${y0-lineGap*.55}" x2="${xEnd}" y2="${y0+staffHeight}" stroke="${ink}" stroke-width="4"/>`:"";
    return `${lines}${grid}${endBar}${frets}${beams}${motions}`;
  }).join("");
  return `<div class="notation-board"><svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" role="img" aria-label="${html(exercise.name)} rhythmic TAB notation"><rect x="0" y="0" width="${width}" height="${height}" fill="${paper}"/>${systemSvgs}</svg></div>`;
}
function renderExerciseInfo(exercise,sectionTitle){
  const steps=buildTechniqueSteps(exercise);
  const notes=steps.flatMap(step=>Array.isArray(step.note)?step.note:(step.note?[step.note]:[])).filter(note=>Number.isFinite(Number(note.f)));
  const frets=notes.map(note=>Number(note.f));
  const minFret=frets.length?Math.min(...frets):0;
  const maxFret=frets.length?Math.max(...frets):0;
  const span=frets.length?`${minFret}-${maxFret}`:"open";
  const items=[
    ["Loop",`${steps.length||1} timed steps. Play one step per click, then repeat without pausing.`],
    ["Focus",techniqueFocusForSection(sectionTitle)],
    ["Level Up",`When you can play 3 clean loops at ${exercise.tempo} BPM range, raise the metronome by 5 BPM.`],
    ["Map",`Position around frets ${span}. Read the notation left to right; each fret number is one timed attack.`]
  ];
  return `<div class="exercise-info">${items.map(([label,text])=>`<div class="exercise-info-item"><strong>${html(label)}</strong><span>${html(text)}</span></div>`).join("")}</div>`;
}
function renderTechniqueExercise(exercise,sectionTitle=""){
  return `<article class="exercise-card">
    <div>
      <strong>${html(exercise.name)}</strong>
      <div class="exercise-meta">
        <span class="tech-tag">${html(exercise.tempo)} BPM</span>
        <span class="tech-tag">${html(exercise.pattern)}</span>
      </div>
    </div>
    ${renderNotationBoard(exercise)}
    <p class="exercise-note">${html(exercise.note||"")}</p>
    ${renderExerciseInfo(exercise,sectionTitle)}
  </article>`;
}
function renderTechniqueLesson(page){
  return `<div class="tech-stack">${(page.sections||[]).map(section=>`<section class="tech-section">
    <div class="tech-section-head">
      <h3>${html(section.title)}</h3>
      <div class="meta">${html(section.focus||"")}</div>
    </div>
    <div class="tech-grid">${(section.exercises||[]).map(exercise=>renderTechniqueExercise(exercise,section.title)).join("")}</div>
  </section>`).join("")}</div>`;
}
function renderVisualLesson(page,type){
  if(type==="sequence"||type==="interval")return `<section class="card"><h3>${type==="sequence"?"Pattern":"Interval Map"}</h3>${renderDegreeStrip(page.degrees||[])}<div class="tab-box" style="margin-top:12px"><pre>${html(page.formula||"")}</pre></div></section>`;
  if(["chordGrid","stringSets","voicing","arpeggio"].includes(type))return `<section class="card"><h3>${type==="voicing"?"Voicing Blocks":type==="arpeggio"?"Arpeggio Blocks":"Diagram Blocks"}</h3>${renderCards(page.cards||[],type)}</section>`;
  return `<section class="card"><h3>Lesson Material</h3><div class="tab-box"><pre>${html(page.tab||"")}</pre></div></section>`;
}
function renderProgressBlock(saved){
  return `<section class="card"><h3>Practice Notes</h3><textarea id="lessonNotes" placeholder="Practice notes...">${html(saved.notes||"")}</textarea><div class="notes-actions"><button onclick="saveNotes()">Save Notes</button></div></section>`;
}
function renderLesson(){
  const lesson=lessons[currentLessonIndex],page=lesson.pages[currentPageIndex],saved=(getProgress()[lesson.id]||{});
  if(lesson.visualType==="scalar"){
    app.innerHTML=`<section class="card"><div class="meta">${html(lesson.category)}</div><h1>${html(lesson.title)}</h1><p>${html(page.body)}</p></section><div class="content-grid"><div>${renderScalarLesson(page)}</div><div>${renderProgressBlock(saved)}</div></div>`;
    return;
  }
  if(lesson.visualType==="technique"){
    app.innerHTML=`<section class="card"><div class="meta">${html(lesson.category)}</div><h1>${html(lesson.title)}</h1><h2>${html(page.heading)}</h2><p>${html(page.body)}</p></section><div class="content-grid"><div>${renderTechniqueLesson(page)}</div><div>${renderProgressBlock(saved)}</div></div>`;
    return;
  }
  if(lesson.visualType==="mode3nps"){
    currentShapeIndex=page.shapeIndex;
    const shape=modeShapes3Nps[currentShapeIndex];
    app.innerHTML=`<section class="card toolbar"><div><div class="meta">${html(lesson.category)} - Page ${currentPageIndex+1} of ${lesson.pages.length}</div><h1>${html(page.mode)}</h1><div class="pill-row"><span class="pill">Formula: ${html(page.formula)}</span><span class="pill">Character: ${html(page.character)}</span><span class="pill">Sound: ${html(page.sound)}</span></div></div></section>
    <div class="content-grid"><div><section class="card"><h3>3 Notes Per String</h3><div class="fretboard-controls"><button class="icon" onclick="previousShape()">&lt;</button><strong class="shape-title">Fret ${shape.startFret}</strong><button class="icon" onclick="nextShape()">&gt;</button></div><div class="fretboard-wrap">${renderFretboard(shape,page.root,false)}</div></section><section class="card"><h3>Tab</h3><div class="tab-box"><pre>${html(shape.tab)}</pre></div></section></div><div>${renderProgressBlock(saved)}</div></div>`;
    return;
  }
  app.innerHTML=`<section class="card"><div class="meta">${html(lesson.category)} - Page ${currentPageIndex+1} of ${lesson.pages.length}</div><h1>${html(lesson.title)}</h1><h2>${html(page.heading)}</h2><p>${html(page.body)}</p><div class="pill-row">${page.formula?`<span class="pill">${html(page.formula)}</span>`:""}${page.interval?`<span class="pill">Interval: ${html(page.interval)}</span>`:""}</div></section><div class="content-grid"><div>${renderVisualLesson(page,lesson.visualType)}</div><div>${renderProgressBlock(saved)}</div></div>`;
}
function previousShape(){currentShapeIndex=(currentShapeIndex+modeShapes3Nps.length-1)%modeShapes3Nps.length;lessons[currentLessonIndex].pages[currentPageIndex].shapeIndex=currentShapeIndex;renderLesson()}
function nextShape(){currentShapeIndex=(currentShapeIndex+1)%modeShapes3Nps.length;lessons[currentLessonIndex].pages[currentPageIndex].shapeIndex=currentShapeIndex;renderLesson()}
function markComplete(){const lesson=lessons[currentLessonIndex],p=getProgress();p[lesson.id]=p[lesson.id]||{};p[lesson.id].completed=true;p[lesson.id].lastPracticed=new Date().toISOString().slice(0,10);saveProgress(p);renderLesson()}
function saveBestBpm(){const lesson=lessons[currentLessonIndex],p=getProgress();p[lesson.id]=p[lesson.id]||{};p[lesson.id].bestBpm=Number(bpmInput.value);p[lesson.id].lastPracticed=new Date().toISOString().slice(0,10);saveProgress(p);renderLesson()}
function saveNotes(){const lesson=lessons[currentLessonIndex],p=getProgress();p[lesson.id]=p[lesson.id]||{};p[lesson.id].notes=document.getElementById("lessonNotes").value;saveProgress(p);renderLesson()}
function nextPage(){if(currentLessonIndex===null)return;const lesson=lessons[currentLessonIndex];if(currentPageIndex<lesson.pages.length-1){currentPageIndex++;renderLesson();window.scrollTo(0,0);return}if(currentLessonIndex<lessons.length-1){openLesson(currentLessonIndex+1,0);window.scrollTo(0,0);return}renderHome()}
function previousPage(){if(currentLessonIndex===null)return;if(currentPageIndex>0){currentPageIndex--;renderLesson();window.scrollTo(0,0);return}if(currentLessonIndex>0){const prev=lessons[currentLessonIndex-1];openLesson(currentLessonIndex-1,prev.pages.length-1);window.scrollTo(0,0);return}renderHome()}

bpmInput.addEventListener("focus",()=>{if(isPlaying)stopMetronome()});
bpmInput.addEventListener("input",e=>syncBpm(e.target.value));
bpmInput.addEventListener("blur",async()=>{if(Number(bpmInput.value)>0)await startMetronome()});
bpmSlider.addEventListener("pointerdown",()=>{if(isPlaying)stopMetronome()});
bpmSlider.addEventListener("input",e=>syncBpm(e.target.value));
bpmSlider.addEventListener("change",async()=>{if(Number(bpmSlider.value)>0)await startMetronome()});
bpmDown.addEventListener("click",()=>syncBpm(Number(bpmInput.value)-5));
bpmUp.addEventListener("click",()=>syncBpm(Number(bpmInput.value)+5));
metroToggle.addEventListener("click",async()=>{if(isPlaying)stopMetronome();else{await requestWakeLock();await startMetronome()}});
nextBtn.addEventListener("click",nextPage);
backBtn.addEventListener("click",previousPage);
homeBtn.addEventListener("click",renderHome);
syncBpm(getGlobalBpm());
renderHome();
</script>
</body>
