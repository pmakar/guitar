<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Shredmasster</title>
  <style>
    :root{
      --bottom-height:118px;
      --bg:#08090a;
      --surface:#11161a;
      --surface-2:#171e23;
      --surface-3:#20282f;
      --text:#edf2f3;
      --muted:#98a6ac;
      --line:#2b353c;
      --accent:#b9362f;
      --accent-2:#d9b36c;
      --good:#63b37b;
      --shadow:0 18px 52px rgba(0,0,0,.38);
    }

    *{box-sizing:border-box}
    html{background:var(--bg)}
    body{
      min-height:100vh;
      margin:0;
      touch-action:manipulation;
      -webkit-text-size-adjust:100%;
      font-family:"Inter Tight","Roboto Condensed","Arial Narrow",system-ui,sans-serif;
      letter-spacing:0;
      color:var(--text);
      background:
        linear-gradient(90deg,rgba(185,54,47,.16),transparent 26%,transparent 72%,rgba(217,179,108,.08)),
        repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 8px),
        radial-gradient(circle at 50% 0%,#182027 0,#08090a 58%);
    }

    button,input,textarea{font:inherit}
    button{
      appearance:none;
      border:1px solid var(--line);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(0,0,0,.16)),var(--surface-2);
      color:var(--text);
      min-height:42px;
      padding:10px 14px;
      font-weight:750;
      font-size:14px;
      cursor:pointer;
      text-transform:uppercase;
      letter-spacing:.04em;
      transition:transform .12s ease,border-color .12s ease,background .12s ease;
    }
    button:active{transform:translateY(1px)}
    button.primary{background:linear-gradient(180deg,#d4483f,#9e2823);border-color:#e45c52;color:#fff}
    button.ghost{background:#0b0f12}
    button.icon{width:44px;padding:0;display:grid;place-items:center;font-size:20px}

    input[type=number]{
      width:78px;
      height:42px;
      padding:8px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#080b0d;
      color:var(--text);
      font-size:18px;
      font-weight:800;
      text-align:center;
    }
    input[type=range]{width:100%;accent-color:var(--accent)}
    textarea{
      width:100%;
      min-height:96px;
      resize:vertical;
      border-radius:8px;
      border:1px solid var(--line);
      background:#090d10;
      color:var(--text);
      padding:12px;
      font-size:16px;
      line-height:1.45;
    }

    .top-nav{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:20;
      display:grid;
      grid-template-columns:44px minmax(0,1fr) 44px;
      align-items:center;
      gap:10px;
      padding:12px max(14px,env(safe-area-inset-left)) 10px;
      background:rgba(7,9,11,.88);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(16px);
    }
    .brand{
      min-width:0;
      text-align:center;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#fff;
    }
    .brand span{color:var(--accent-2)}

    .bottom-nav{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      z-index:20;
      min-height:var(--bottom-height);
      padding:12px max(14px,env(safe-area-inset-left)) max(12px,env(safe-area-inset-bottom));
      background:rgba(7,9,11,.9);
      border-top:1px solid var(--line);
      backdrop-filter:blur(16px);
    }
    .metronome-bottom{
      display:grid;
      grid-template-columns:44px 78px 44px minmax(120px,1fr) 92px;
      gap:10px;
      align-items:center;
      width:100%;
      max-width:980px;
      margin:0 auto;
    }

    main{
      width:min(100%,1040px);
      margin:0 auto;
      padding:88px 16px calc(var(--bottom-height) + 24px);
    }
    h1,h2,h3,p{margin-top:0}
    h1{
      margin-bottom:8px;
      font-size:clamp(34px,7vw,72px);
      line-height:.92;
      text-transform:uppercase;
      letter-spacing:.015em;
    }
    h2{font-size:clamp(24px,4vw,38px);line-height:1;margin-bottom:10px}
    h3{font-size:17px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent-2)}
    p{line-height:1.55}

    .hero{
      min-height:220px;
      display:grid;
      align-content:end;
      border-radius:8px;
      border:1px solid var(--line);
      border-left:5px solid var(--accent);
      padding:22px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
      background:
        linear-gradient(180deg,rgba(8,9,10,.08),rgba(8,9,10,.82)),
        radial-gradient(circle at 90% 18%,rgba(217,179,108,.24),transparent 28%),
        linear-gradient(135deg,#1e272d,#0c1013 58%,#08090a);
    }
    .card{
      min-width:0;
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(0,0,0,.18)),var(--surface);
      border:1px solid var(--line);
      border-radius:8px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 10px 26px rgba(0,0,0,.2);
    }
    .meta{color:var(--muted);font-size:14px;line-height:1.45}
    .subtle{color:var(--muted)}
    .lesson-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(238px,1fr));gap:12px}
    .lesson-button{
      display:grid;
      grid-template-rows:auto 1fr auto;
      width:100%;
      min-height:142px;
      padding:15px;
      text-align:left;
      text-transform:none;
      letter-spacing:0;
      background:linear-gradient(160deg,rgba(255,255,255,.055),rgba(0,0,0,.12)),var(--surface-2);
    }
    .lesson-button:hover{border-color:#56636b}
    .lesson-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
    .lesson-id{
      display:grid;
      place-items:center;
      width:34px;
      height:34px;
      flex:0 0 auto;
      border-radius:50%;
      background:var(--accent);
      color:#fff;
      font-weight:900;
    }
    .lesson-title{font-size:20px;line-height:1.05;font-weight:900;text-transform:uppercase}
    .status{
      display:inline-flex;
      align-items:center;
      gap:6px;
      width:max-content;
      border:1px solid var(--line);
      border-radius:999px;
      padding:5px 9px;
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.05em;
    }
    .status.done{color:#dff5e4;border-color:rgba(99,179,123,.5);background:rgba(99,179,123,.12)}

    .toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .pill{
      display:inline-flex;
      align-items:center;
      min-height:32px;
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#0c1114;
      color:var(--muted);
      font-size:14px;
      line-height:1.2;
    }

    .content-grid{display:grid;grid-template-columns:1fr;gap:14px}
    .content-grid>*{min-width:0}
    .visual-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
    .visual-card{
      min-height:96px;
      border:1px solid var(--line);
      border-radius:8px;
      padding:13px;
      background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(0,0,0,.15)),#0d1215;
    }
    .visual-card strong{display:block;margin-bottom:8px;color:#fff;font-size:18px;text-transform:uppercase}
    .string-set-break{
      grid-column:1/-1;
      margin-top:12px;
      padding:10px 12px;
      border-top:2px solid var(--accent);
      border-bottom:1px solid var(--line);
      color:var(--accent-2);
      background:#090d10;
      font-size:15px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.08em;
    }
    .string-set-break:first-child{margin-top:0}
    .diagram-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
    .diagram-block{min-width:150px;flex:1 1 150px}
    .diagram-label{margin-bottom:6px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
    .mini-fretboard{
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:8px;
      background:
        repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0,rgba(255,255,255,.018) 1px,transparent 1px,transparent 8px),
        #090d10;
    }
    .mini-fretboard svg{display:block;width:100%;height:auto}
    .formula-line{font-family:"SFMono-Regular","Courier New",monospace;letter-spacing:0;color:var(--text);font-size:14px;line-height:1.5;white-space:pre-wrap}
    .scalar-stack{display:grid;gap:14px}
    .compact-list{display:grid;gap:8px}
    .compact-row{
      display:grid;
      grid-template-columns:minmax(86px,.34fr) minmax(0,1fr);
      gap:10px;
      align-items:start;
      border:1px solid var(--line);
      border-radius:8px;
      padding:11px 12px;
      background:#0d1215;
    }
    .compact-row strong{color:#fff;text-transform:uppercase}
    .compact-row .meta{font-size:13px}
    .scale-board-list{display:grid;gap:12px}
    .scale-board{
      min-width:0;
      border:1px solid var(--line);
      border-radius:8px;
      padding:12px;
      background:#0d1215;
    }
    .scale-board-title{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      color:#fff;
      font-size:18px;
      font-weight:900;
      text-transform:uppercase;
    }
    .scale-board-title span{color:var(--accent-2);font-size:14px}
    .scale-board-title strong{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .scale-board-title strong span{
      display:inline-flex;
      align-items:center;
      min-height:24px;
      padding:3px 8px;
      border:1px solid rgba(217,179,108,.35);
      border-radius:999px;
      background:#090d10;
      color:var(--accent-2);
      font-size:13px;
      line-height:1;
    }
    .tab-box,.fretboard-wrap{
      overflow-x:auto;
      border:1px solid var(--line);
      border-radius:8px;
      padding:14px;
      background:
        repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 7px),
        #0a0f12;
      box-shadow:inset 0 0 24px rgba(0,0,0,.42);
    }
    pre{margin:0;font-family:"SFMono-Regular","Courier New",monospace;font-size:15px;line-height:1.55;white-space:pre;letter-spacing:0}

    .fretboard-controls{
      display:grid;
      grid-template-columns:44px 1fr 44px;
      gap:10px;
      align-items:center;
      margin:10px 0 12px;
    }
    .shape-title{text-align:center;font-weight:900;text-transform:uppercase;color:#fff}
    .degree-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .degree{
      width:36px;
      height:36px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:#edf2f3;
      color:#090d10;
      border:2px solid #090d10;
      font-family:"SFMono-Regular","Courier New",monospace;
      font-size:12px;
      font-weight:900;
    }
    .degree.root{background:var(--accent);color:#fff;border-color:#f1d6d4}
    .progress-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:12px}
    .notes-actions{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:10px}

    @media(min-width:760px){
      main{padding-left:24px;padding-right:24px}
      .content-grid{grid-template-columns:minmax(0,1.45fr) minmax(280px,.8fr)}
      .progress-grid{grid-template-columns:1fr 1fr}
    }
    @media(max-width:560px){
      :root{--bottom-height:160px}
      .metronome-bottom{grid-template-columns:44px 78px 44px 1fr}
      #metroToggle{grid-column:1/-1;width:100%}
      h1{font-size:42px}
      .hero{padding:18px;min-height:210px}
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <button class="icon" id="backBtn" aria-label="Previous">&lt;</button>
    <button class="brand ghost" id="homeBtn" aria-label="Home">Shred<span>masster</span></button>
    <button class="icon" id="nextBtn" aria-label="Next">&gt;</button>
  </header>
  <main id="app"></main>
  <footer class="bottom-nav">
    <div class="metronome-bottom">
      <button class="icon" id="bpmDown" aria-label="Decrease BPM">−</button>
      <input id="bpmInput" aria-label="BPM" type="number" min="0" max="240" step="5" value="80"/>
      <button class="icon" id="bpmUp" aria-label="Increase BPM">+</button>
      <input id="bpmSlider" aria-label="BPM slider" type="range" min="0" max="240" step="5" value="80"/>
      <button class="primary" id="metroToggle">Start</button>
    </div>
  </footer>

<script>
const dropQualities={
  Maj7:["1","3","5","7"],
  Min7:["1","b3","5","b7"],
  MinMaj7:["1","b3","5","7"],
  HalfDim:["1","b3","b5","b7"],
  Dim:["1","b3","b5","bb7"],
  MajAug:["1","3","#5","7"],
  Dom7:["1","3","5","b7"],
  Dom7sus:["1","4","5","b7"],
  Dom7aug:["1","3","#5","b7"]
};
const dropInversions=[
  ["Root Position",[0,2,3,1]],
  ["1st Inversion",[1,3,0,2]],
  ["2nd Inversion",[2,0,1,3]],
  ["3rd Inversion",[3,1,2,0]]
];
const drop3Inversions=[
  ["Root Position",[0,3,1,2]],
  ["1st Inversion",[1,0,2,3]],
  ["2nd Inversion",[2,1,3,0]],
  ["3rd Inversion",[3,2,0,1]]
];
const drop2StringSets=[
  ["E String","E A D G",3],
  ["A String","A D G B",10],
  ["D String","D G B e",5]
];
const drop3StringSets=[
  ["E String","E D G B",3],
  ["A String","A G B e",10]
];
function makeDropPages(type,inversion,cards){
  return [
    {heading:`${inversion} - Shape First`,body:"Learn the grip shape first. Static control before movement.",cards:cards.map(c=>[c[0],c[1],"main shape"])},
    {heading:`${inversion} - Diatonically`,body:"Run the same shape through the key: I ii iii IV V vi vii°.",cards:[["Key of G","Gmaj7 -> Am7 -> Bm7 -> Cmaj7 -> D7 -> Em7 -> F#m7b5","full harmonisation"]]},
    {heading:`${inversion} - II-V-I`,body:"Apply the same shape to real harmonic movement.",cards:[["Major II-V-I","Am7 -> D7 -> Gmaj7","essential"],["Minor II-V-I","Bm7b5 -> E7 -> AmMaj7","advanced"]]}
  ];
}
function makeDrop2Cards(){
  return makeDropCards(dropInversions,drop2StringSets,"E, A and D string voicings");
}
function makeDrop3Cards(){
  return makeDropCards(drop3Inversions,drop3StringSets,"E and A string voicings");
}
function makeDropCards(inversions,stringSets,label){
  return inversions.flatMap(([group,order])=>Object.entries(dropQualities).map(([name,degrees])=>{
    const voicedDegrees=order.map(index=>degrees[index]);
    return [
      name,
      voicedDegrees.join(" "),
      label,
      {
        group,
        voicings:stringSets.map(([voicingLabel,strings,start])=>({
          label:voicingLabel,
          strings,
          start,
          degrees:voicedDegrees
        }))
      }
    ];
  }));
}
const triadStringSets=[
  ["Strings 6-5-4","E A D"],
  ["Strings 5-4-3","A D G"],
  ["Strings 4-3-2","D G B"],
  ["Strings 3-2-1","G B e"]
];
const triadInversions=[
  ["Root","1 3 5"],
  ["1st Inversion","3 5 1"],
  ["2nd Inversion","5 1 3"]
];
const triadQualities=[
  ["Major",["1","3","5"]],
  ["Minor",["1","b3","5"]],
  ["Diminished",["1","b3","b5"]],
  ["Augmented",["1","3","#5"]]
];
function invertDegrees(degrees,index){
  return degrees.slice(index).concat(degrees.slice(0,index));
}
function makeTriadStringSetCards(){
  return triadStringSets.flatMap(set=>triadQualities.flatMap(quality=>triadInversions.map((inversion,index)=>[
    `${quality[0]} - ${inversion[0]}`,
    invertDegrees(quality[1],index).join(" "),
    set[1],
    {group:set[0],strings:set[1],degrees:invertDegrees(quality[1],index),fretShift:2}
  ])));
}
const arpeggioQualities=[
  ["Major",["1","3","5"]],
  ["Minor",["1","b3","5"]],
  ["Diminished",["1","b3","b5"]],
  ["Augmented",["1","3","#5"]],
  ...Object.entries(dropQualities)
];
const arpeggioPositions=[
  ["Root on E String","All notes in position",{strings:[6,5,4,3,2,1],start:3}],
  ["Root on A String","All notes in position",{strings:[5,4,3,2,1],start:10}]
];
function makeArpeggioCards(){
  return arpeggioPositions.flatMap(([group,label,position])=>arpeggioQualities.map(([name,degrees])=>[
    name,
    degrees.join(" "),
    label,
    {group,arpeggio:{...position,degrees}}
  ]));
}
const susQualities=[
  ["Sus2add4",["1","2","4","5"]],
  ["7sus2",["1","2","5","b7"]],
  ["7sus4",["1","4","5","b7"]],
  ["9sus4",["1","4","b7","9"]],
  ["13sus4",["1","4","b7","6"]],
  ["11sus",["1","5","b7","4"]]
];
const quartalQualities=[
  ["Perfect Quartal",["1","4","b7","b3"]],
  ["Major Quartal",["1","4","7","3"]],
  ["Lydian Quartal",["1","#4","7","3"]],
  ["Dominant Quartal",["1","4","b7","3"]],
  ["Altered Quartal",["1","#4","b7","b3"]]
];
const chordVoicingSets={
  3:[
    ["E String","E A D",3],
    ["A String","A D G",10]
  ],
  4:[
    ["E String","E A D G",3],
    ["A String","A D G B",10]
  ],
  5:[
    ["E String","E A D G B",3],
    ["A String","A D G B e",10]
  ]
};
function inversionLabel(index){
  return ["Root","1st","2nd","3rd","4th"][index]||`${index + 1}th`;
}
function stringNumbersFromNames(stringsValue){
  const stringNames={e:1,B:2,G:3,D:4,A:5,E:6};
  return String(stringsValue).split(/\s+/).map(token=>stringNames[token]).filter(Boolean);
}
function isPlayableVoicing(degrees,strings,start,maxSpan=4){
  const stringsNumbers=stringNumbersFromNames(strings);
  const pcs=degrees.map(degree=>(scaleRootG+(degreePc[degree]??0))%12);
  const frets=compactFretsForPcs(stringsNumbers,pcs,start);
  return Math.max(...frets)-Math.min(...frets)<=maxSpan;
}
function makeChordVoicingCards(category,qualities){
  return ["E String","A String"].flatMap(setName=>qualities.flatMap(([name,degrees])=>{
    const set=(chordVoicingSets[degrees.length]||chordVoicingSets[4]).find(item=>item[0]===setName);
    if(!set)return [];
    const [,strings,start]=set;
    return degrees.map((_,index)=>{
      const voicedDegrees=invertDegrees(degrees,index);
      return [
        `${name} - ${inversionLabel(index)}`,
        voicedDegrees.join(" "),
        strings,
        {group:`${category} - ${setName}`,strings,degrees:voicedDegrees,start}
      ];
    }).filter(card=>isPlayableVoicing(card[3].degrees,card[3].strings,card[3].start));
  }));
}
function makeSusQuartalCards(){
  return [
    ...makeChordVoicingCards("Suspended",susQualities),
    ...makeChordVoicingCards("Quartal",quartalQualities)
  ];
}
const majorModeShapes=[
  {mode:"Aeolian",chord:"Em7",root:"E",shapeIndex:5},
  {mode:"Locrian",chord:"F#m7b5",root:"F#",shapeIndex:6},
  {mode:"Ionian",chord:"Gmaj7",root:"G",shapeIndex:0},
  {mode:"Dorian",chord:"Am7",root:"A",shapeIndex:1},
  {mode:"Phrygian",chord:"Bm7",root:"B",shapeIndex:2},
  {mode:"Lydian",chord:"Cmaj7#11",root:"C",shapeIndex:3},
  {mode:"Mixolydian",chord:"D7",root:"D",shapeIndex:4}
];
const pitchNames=["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];
const stringPitch={1:4,2:11,3:7,4:2,5:9,6:4};
const notePc={C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11};
const degreePc={"1":0,R:0,b2:1,"2":2,b3:3,"3":4,"4":5,"#4":6,b5:6,"5":7,"#5":8,b6:8,"6":9,bb7:9,b7:10,"7":11,"9":2};
const scaleRootG=7;
const scaleIntervals={
  harmonicMinor:[0,2,3,5,7,8,11],
  melodicMinor:[0,2,3,5,7,9,11],
  wholeTone:[0,2,4,6,8,10],
  halfWholeDiminished:[0,1,3,4,6,7,9,10],
  wholeHalfDiminished:[0,2,3,5,6,8,9,11]
};
function makeScaleShape(name,startFret,rootPc,intervals){
  const pitchSet=new Set(intervals.map(interval=>(rootPc+interval)%12));
  const notes=[];
  for(let s=6;s>=1;s--){
    let stringNotes=0;
    for(let f=startFret;f<startFret+7;f++){
      const pc=(stringPitch[s]+f)%12;
      if(pitchSet.has(pc)){

function findFretForPc(stringNumber,pc,start=3){

  }

}

function compactFretsForPcs(strings,pcs,start=3){
  const candidates=pcs.map((pc,index)=>candidateFretsForPc(strings[index],pc));
  const combos=[];
  function walk(index,current){
    if(index===candidates.length){
      const min=Math.min(...current),max=Math.max(...current);
      const span=max-min;
      const center=current.reduce((sum,f)=>sum+f,0)/current.length;
      const openPenalty=current.filter(f=>f===0).length*1.5;
      const score=span*10+Math.abs(center-start)*1.4+openPenalty;
      combos.push({frets:current,score});
      return;
    }
    candidates[index].forEach(fret=>walk(index+1,current.concat(fret)));
  }
  walk(0,[]);

  return combos[0]?.frets||pcs.map((pc,index)=>findFretForPc(strings[index],pc,start));

function chordRootPc(name){

function chordFormula(name){
  const value=String(name);
  if(/m7b5|half/i.test(value))return ["1","b3","b5","b7"];
  if(/dim7/i.test(value))return ["1","b3","b5","bb7"];
  if(/dim/i.test(value))return ["1","b3","b5"];
  if(/mMaj7/i.test(value))return ["1","b3","5","7"];
  if(/maj7/i.test(value))return ["1","3","5","7"];
  if(/min7|m7/.test(value))return ["1","b3","5","b7"];
  if(/sus2/i.test(value))return ["1","2","5"];
  if(/sus4/i.test(value))return ["1","4","5"];
  if(/9sus/i.test(value))return ["1","4","5","b7","9"];
  if(/aug/i.test(value))return ["1","3","#5"];
  if(/7/.test(value))return ["1","3","5","b7"];
  if(/^m|Min|minor/i.test(value))return ["1","b3","5"];

function stringsForCount(count){

}

function shapeFromDegreesOnStrings(name,degrees,stringsValue,rootPc=scaleRootG,start=3,fretShift=0){
  const stringNames={e:1,B:2,G:3,D:4,A:5,E:6};
  const strings=String(stringsValue).split(/\s+/).map(token=>stringNames[token]).filter(Boolean);
  const pcs=degrees.map(degree=>(rootPc+(degreePc[degree]??0))%12);
  const frets=compactFretsForPcs(strings,pcs,start);
  const notes=degrees.map((degree,index)=>{
    const s=strings[index]||strings[strings.length-1]||1;
    const pc=pcs[index];
    return {s,f:frets[index],n:pitchNames[pc]};

  strings.forEach(s=>{
    for(let f=start;f<=start+4;f++){
      const pc=(stringPitch[s]+f)%12;
      if(pcs.has(pc))notes.push({s,f,n:pitchNames[pc]});

  const dots=shape.notes.map(note=>{
    const x=left+(note.f+fretShift-start)*fretGap+fretGap/2,y=top+(note.s-1)*stringGap;
    return `<circle cx="${x}" cy="${y}" r="7" fill="#edf2f3" stroke="#090d10" stroke-width="1.5"/>`;

function renderDiagramBlocks(card,type){
  const [title,value,,options]=card;
  if(options?.arpeggio){
    const arpeggio=options.arpeggio;

  }
  if(options?.voicings){
    return options.voicings.map(voicing=>`<div class="diagram-block"><div class="diagram-label">${html(voicing.label)}</div>${renderMiniFretboard(shapeFromDegreesOnStrings(`${title} ${voicing.label}`,voicing.degrees,voicing.strings,scaleRootG,voicing.start||3,voicing.fretShift||0))}</div>`).join("");

  if(options?.strings&&options?.degrees){
    return `<div class="diagram-block">${renderMiniFretboard(shapeFromDegreesOnStrings(title,options.degrees,options.strings,scaleRootG,options.start||3,options.fretShift||0))}</div>`;
  }
  const progression=progressionNames(value);

    return progression.map(name=>`<div class="diagram-block"><div class="diagram-label">${html(name)}</div>${renderMiniFretboard(shapeFromDegrees(name,chordFormula(name),chordRootPc(name)))}</div>`).join("");

  }
  const degreeTokens=parseDegreeTokens(value);
  if(degreeTokens.length){
    return `<div class="diagram-block">${renderMiniFretboard(shapeFromDegrees(title,degreeTokens))}</div>`;
  }
  const noteTokens=parseNoteTokens(value);
  if(noteTokens.length){
    return `<div class="diagram-block">${renderMiniFretboard(shapeFromPcs(title,noteTokens.map(note=>notePc[note])))}</div>`;
  }
  return `<div class="diagram-block">${renderMiniFretboard(shapeFromDegrees(title,chordFormula(title),chordRootPc(title)))}</div>`;
}
function renderCards(cards=[],type=""){
  let activeGroup="";
  return `<div class="visual-grid">${cards.map(card=>{
    const group=card[3]?.group||"";
    const header=group&&group!==activeGroup?`<div class="string-set-break">${html(group)} · ${html(card[2]||"")}</div>`:"";
    if(group)activeGroup=group;
    return `${header}<div class="visual-card"><strong>${html(card[0])}</strong><div class="diagram-row">${renderDiagramBlocks(card,type)}</div><div class="meta">${html(card[2]||"")}</div></div>`;
  }).join("")}</div>`;
}
function renderScalarLesson(page){
  return `<div class="scalar-stack">
    <section class="card">
      <h3>${html(page.shapeHeading||"Scale Shapes")}</h3>
      <div class="scale-board-list">${page.modes.map(mode=>{
        const shape=mode.shape||modeShapes3Nps[mode.shapeIndex];
        const root=mode.root||shape.root||mode.mode.split(" ")[0];
        const chord=mode.chord?`<span>${html(mode.chord)}</span>`:"";
        const shapeLabel=mode.mode===shape.name?"":`<span>${html(shape.name)}</span>`;
        return `<div class="scale-board">
        <div class="scale-board-title"><strong>${html(mode.mode)}${chord}</strong>${shapeLabel}</div>
        <div class="fretboard-wrap">${renderFretboard(shape,root,false)}</div>
      </div>`;
      }).join("")}</div>
    </section>
    <section class="card">
      <h3>Sequences</h3>
      <div class="compact-list">${page.sequences.map(sequence=>`<div class="compact-row">
        <div><strong>${html(sequence.heading)}</strong>${renderDegreeStrip(sequence.degrees)}</div>
        <div class="formula-line">${html(sequence.formula)}</div>
      </div>`).join("")}</div>
    </section>
    <section class="card">
      <h3>Intervals</h3>
      <div class="compact-list">${page.intervals.map(interval=>`<div class="compact-row">
        <div><strong>${html(interval.heading)}</strong>${renderDegreeStrip(interval.degrees)}</div>
        <div class="formula-line">${html(interval.formula)}</div>
      </div>`).join("")}</div>
    </section>
  </div>`;
}
function renderVisualLesson(page,type){
  if(type==="sequence"||type==="interval")return `<section class="card"><h3>${type==="sequence"?"Pattern":"Interval Map"}</h3>${renderDegreeStrip(page.degrees||[])}<div class="tab-box" style="margin-top:12px"><pre>${html(page.formula||"")}</pre></div></section>`;
  if(["chordGrid","stringSets","voicing","arpeggio"].includes(type))return `<section class="card"><h3>${type==="voicing"?"Voicing Blocks":type==="arpeggio"?"Arpeggio Blocks":"Diagram Blocks"}</h3>${renderCards(page.cards||[],type)}</section>`;
  return `<section class="card"><h3>Lesson Material</h3><div class="tab-box"><pre>${html(page.tab||"")}</pre></div></section>`;
}
function renderProgressBlock(saved){
  return `<section class="card"><h3>Practice Notes</h3><textarea id="lessonNotes" placeholder="Practice notes...">${html(saved.notes||"")}</textarea><div class="notes-actions"><button onclick="saveNotes()">Save Notes</button></div></section>`;
}
function renderLesson(){
  const lesson=lessons[currentLessonIndex],page=lesson.pages[currentPageIndex],saved=(getProgress()[lesson.id]||{});
  if(lesson.visualType==="scalar"){
    app.innerHTML=`<section class="card"><div class="meta">Lesson ${lesson.id} - ${html(lesson.category)}</div><h1>${html(lesson.title)}</h1><p>${html(page.body)}</p></section><div class="content-grid"><div>${renderScalarLesson(page)}</div><div>${renderProgressBlock(saved)}</div></div>`;
    return;
  }
  if(lesson.visualType==="mode3nps"){
    currentShapeIndex=page.shapeIndex;
    const shape=modeShapes3Nps[currentShapeIndex];
    app.innerHTML=`<section class="card toolbar"><div><div class="meta">Lesson ${lesson.id} - ${html(lesson.category)} - Page ${currentPageIndex+1} of ${lesson.pages.length}</div><h1>${html(page.mode)}</h1><div class="pill-row"><span class="pill">Formula: ${html(page.formula)}</span><span class="pill">Character: ${html(page.character)}</span><span class="pill">Sound: ${html(page.sound)}</span></div></div></section>
    <div class="content-grid"><div><section class="card"><h3>3 Notes Per String</h3><div class="fretboard-controls"><button class="icon" onclick="previousShape()">&lt;</button><strong class="shape-title">${html(shape.name)} - Fret ${shape.startFret}</strong><button class="icon" onclick="nextShape()">&gt;</button></div><div class="fretboard-wrap">${renderFretboard(shape,page.root,false)}</div></section><section class="card"><h3>Tab</h3><div class="tab-box"><pre>${html(shape.tab)}</pre></div></section></div><div>${renderProgressBlock(saved)}</div></div>`;
    return;
  }
  app.innerHTML=`<section class="card"><div class="meta">Lesson ${lesson.id} - ${html(lesson.category)} - Page ${currentPageIndex+1} of ${lesson.pages.length}</div><h1>${html(lesson.title)}</h1><h2>${html(page.heading)}</h2><p>${html(page.body)}</p><div class="pill-row">${page.formula?`<span class="pill">${html(page.formula)}</span>`:""}${page.interval?`<span class="pill">Interval: ${html(page.interval)}</span>`:""}</div></section><div class="content-grid"><div>${renderVisualLesson(page,lesson.visualType)}</div><div>${renderProgressBlock(saved)}</div></div>`;
}
function previousShape(){currentShapeIndex=(currentShapeIndex+modeShapes3Nps.length-1)%modeShapes3Nps.length;lessons[currentLessonIndex].pages[currentPageIndex].shapeIndex=currentShapeIndex;renderLesson()}
function nextShape(){currentShapeIndex=(currentShapeIndex+1)%modeShapes3Nps.length;lessons[currentLessonIndex].pages[currentPageIndex].shapeIndex=currentShapeIndex;renderLesson()}
function markComplete(){const lesson=lessons[currentLessonIndex],p=getProgress();p[lesson.id]=p[lesson.id]||{};p[lesson.id].completed=true;p[lesson.id].lastPracticed=new Date().toISOString().slice(0,10);saveProgress(p);renderLesson()}
function saveBestBpm(){const lesson=lessons[currentLessonIndex],p=getProgress();p[lesson.id]=p[lesson.id]||{};p[lesson.id].bestBpm=Number(bpmInput.value);p[lesson.id].lastPracticed=new Date().toISOString().slice(0,10);saveProgress(p);renderLesson()}
function saveNotes(){const lesson=lessons[currentLessonIndex],p=getProgress();p[lesson.id]=p[lesson.id]||{};p[lesson.id].notes=document.getElementById("lessonNotes").value;saveProgress(p);renderLesson()}
function nextPage(){if(currentLessonIndex===null)return;const lesson=lessons[currentLessonIndex];if(currentPageIndex<lesson.pages.length-1){currentPageIndex++;renderLesson();window.scrollTo(0,0);return}if(currentLessonIndex<lessons.length-1){openLesson(currentLessonIndex+1,0);window.scrollTo(0,0);return}renderHome()}
function previousPage(){if(currentLessonIndex===null)return;if(currentPageIndex>0){currentPageIndex--;renderLesson();window.scrollTo(0,0);return}if(currentLessonIndex>0){const prev=lessons[currentLessonIndex-1];openLesson(currentLessonIndex-1,prev.pages.length-1);window.scrollTo(0,0);return}renderHome()}

bpmInput.addEventListener("focus",()=>{if(isPlaying)stopMetronome()});
bpmInput.addEventListener("input",e=>syncBpm(e.target.value));
bpmInput.addEventListener("blur",async()=>{if(Number(bpmInput.value)>0)await startMetronome()});
bpmSlider.addEventListener("pointerdown",()=>{if(isPlaying)stopMetronome()});
bpmSlider.addEventListener("input",e=>syncBpm(e.target.value));
bpmSlider.addEventListener("change",async()=>{if(Number(bpmSlider.value)>0)await startMetronome()});
bpmDown.addEventListener("click",()=>syncBpm(Number(bpmInput.value)-5));
bpmUp.addEventListener("click",()=>syncBpm(Number(bpmInput.value)+5));
metroToggle.addEventListener("click",async()=>{if(isPlaying)stopMetronome();else{await requestWakeLock();await startMetronome()}});
nextBtn.addEventListener("click",nextPage);
backBtn.addEventListener("click",previousPage);
homeBtn.addEventListener("click",renderHome);
syncBpm(getGlobalBpm());
renderHome();
</script>
</body>
</html>
